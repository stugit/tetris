<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <h1>TETRIS</h1>
        <div id="game-area">
            <div id="canvas-container">
                <canvas id="board" width="300" height="600"></canvas>
                <div id="overlay">
                    <p id="overlay-msg">Tap or press Space to Start</p>
                </div>
            </div>
            <div id="panel">
                <div class="stat">
                    <span class="label">SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="stat">
                    <span class="label">BEST</span>
                    <span id="high-score">0</span>
                </div>
                <div class="stat">
                    <span class="label">LEVEL</span>
                    <span id="level">1</span>
                </div>
                <div class="stat">
                    <span class="label">LINES</span>
                    <span id="lines">0</span>
                </div>
                <div id="hold-container">
                    <span class="label">HOLD</span>
                    <canvas id="hold" width="120" height="120"></canvas>
                </div>
                <div id="next-container">
                    <span class="label">NEXT</span>
                    <canvas id="next" width="120" height="120"></canvas>
                </div>
                <div id="controls">
                    <p>← → &nbsp;&nbsp;Move</p>
                    <p>↑ / Z &nbsp;Rotate CW</p>
                    <p>↓ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Soft drop</p>
                    <p>Space &nbsp;Hard drop</p>
                    <p>C / ⇧ &nbsp;&nbsp;Hold</p>
                    <p>P &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Pause</p>
                    <p>M &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mute</p>
                    <p class="gesture-hint">── touch ──</p>
                    <p>Tap &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Rotate</p>
                    <p>Long tap &nbsp;Hold</p>
                    <p>Swipe ↑ &nbsp;&nbsp;Hard drop</p>
                    <p>Swipe ← →</p>
                    <p>Swipe ↓ &nbsp;&nbsp;Soft drop</p>
                </div>
                <div id="settings">
                    <div class="setting-group">
                        <label class="setting-item"><input type="checkbox" id="music-check" checked> MUSIC</label>
                        <input type="range" id="music-vol" min="0" max="1" step="0.05" value="0.4">
                    </div>
                    <div class="setting-group">
                        <label class="setting-item"><input type="checkbox" id="sfx-check" checked> SFX</label>
                        <input type="range" id="sfx-vol" min="0" max="1" step="0.05" value="1.0">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>
